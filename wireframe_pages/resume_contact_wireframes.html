<style>
  .wf-pair { display: flex; flex-direction: column; gap: 1.5rem; }
  .wf-shell { display: flex; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
  .wf-shell-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .wf-sidebar { width: 160px; min-width: 160px; border-right: 0.5px solid var(--color-border-tertiary); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px; background: var(--color-background-secondary); }
  .wf-sidebar-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .wf-nav-link { font-size: 13px; color: var(--color-text-secondary); padding: 6px 8px; border-radius: var(--border-radius-md); }
  .wf-nav-link.active { background: var(--color-background-primary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-tertiary); font-weight: 500; }
  .wf-sidebar-icons { margin-top: auto; display: flex; gap: 12px; padding-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); }
  .wf-main { flex: 1; padding: 2rem; display: flex; flex-direction: column; justify-content: center; }
  .wf-page-title { height: 16px; width: 80px; background: var(--color-border-secondary); border-radius: 4px; margin-bottom: 1.5rem; }
  .wf-bar { height: 11px; background: var(--color-background-tertiary); border-radius: 4px; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 7px; }
  .wf-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 1rem; font-size: 13px; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 16px; width: fit-content; }
  .wf-embed { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); height: 180px; display: flex; align-items: center; justify-content: center; margin-top: 1rem; }
  .wf-contact-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .wf-contact-icon { font-size: 18px; color: var(--color-text-tertiary); width: 24px; text-align: center; }
  .wf-contact-bar { height: 11px; background: var(--color-background-tertiary); border-radius: 4px; border: 0.5px solid var(--color-border-tertiary); flex: 1; }
</style>
