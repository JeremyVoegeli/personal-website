<style>
  .wf-shell { display: flex; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; min-height: 600px; background: var(--color-background-primary); }
  .wf-sidebar { width: 160px; min-width: 160px; border-right: 0.5px solid var(--color-border-tertiary); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px; background: var(--color-background-secondary); }
  .wf-sidebar-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .wf-nav-link { font-size: 13px; color: var(--color-text-secondary); padding: 6px 8px; border-radius: var(--border-radius-md); }
  .wf-nav-link.active { background: var(--color-background-primary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-tertiary); font-weight: 500; }
  .wf-sidebar-icons { margin-top: auto; display: flex; gap: 12px; padding-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); }
  .wf-main { flex: 1; padding: 2rem; overflow: hidden; }
  .wf-page-title { height: 16px; width: 80px; background: var(--color-border-secondary); border-radius: 4px; margin-bottom: 1.5rem; }
  .bento { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; gap: 10px; }
  .bento-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0.85rem 1rem; background: var(--color-background-primary); }
  .bento-card.wide { grid-column: span 2; }
  .bento-card.photo { background: var(--color-background-tertiary); display: flex; align-items: center; justify-content: center; min-height: 120px; }
  .card-icon { font-size: 16px; color: var(--color-text-tertiary); margin-bottom: 6px; }
  .card-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .wf-bar { height: 10px; background: var(--color-background-tertiary); border-radius: 4px; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 6px; }
</style>

<h2 class="sr-only">Wireframe of the About page with a bento grid of blurb cards</h2>

</div>
